name: Fetch Instagram Posts

on:
  schedule:
    - cron: '0 0 * * 0'   # weekly, Sunday midnight UTC
  workflow_dispatch:        # manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install instagrapi
        run: python3 -m pip install instagrapi

      - name: Fetch posts
        run: python3 scripts/fetch-ig-posts.py
        env:
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}

      - name: Commit updated posts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/ig-posts.json public/images/ig-posts/
          git diff --staged --quiet || (git commit -m "chore: update instagram posts" && git push)
